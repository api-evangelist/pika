apis:
  - aid: pika-video-api
    name: Pika Video API
    description: >
      RESTful API for programmatic AI video generation powered by Pika 2.2 models via fal.ai.
      Supports text-to-video, image-to-video, Pikascenes, and Pikaframes endpoints with
      configurable resolution (720p/1080p), aspect ratios, and durations (5-10 seconds).
      Authentication uses API key via FAL_KEY environment variable. Pricing is usage-based
      at $0.20 per 5-second 720p clip and $0.45 per 5-second 1080p clip.
    humanURL: https://pika.art/api
    baseURL: https://fal.run/fal-ai/pika
